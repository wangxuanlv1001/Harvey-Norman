<h2>搜索商品</h2>
<div class="search-box">
  <input type="text" [(ngModel)]="keyword" placeholder="输入商品名称关键词" (keyup.enter)="search()">
  <button (click)="search()" class="btn-primary">搜索</button>
  <button (click)="clear()" class="btn-secondary">清空</button>
</div>
<div *ngIf="message" class="feedback error">{{ message }}</div>
<div *ngIf="results.length > 0">
  <h3>搜索结果 ({{ results.length }})</h3>
  <table class="search-table">
    <thead><tr><th>ID</th><th>名称</th><th>类别</th><th>数量</th><th>价格</th><th>供应商</th><th>库存状态</th><th>热门</th></tr></thead>
    <tbody>
      <tr *ngFor="let item of results">
        <td>{{ item.id }}</td><td>{{ item.name }}</td><td>{{ item.category }}</td><td>{{ item.quantity }}</td>
        <td>{{ item.price | currency }}</td><td>{{ item.supplier }}</td><td>{{ item.stockStatus }}</td><td>{{ item.popular ? '是' : '否' }}</td>
      </tr>
    </tbody>
  </table>
</div>

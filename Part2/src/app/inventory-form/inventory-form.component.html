<h2>{{ editingOriginalName ? 'Edit Product' : 'Add Product' }}</h2>
<div *ngIf="message" [class]="messageType" class="feedback">{{ message }}</div>
<form [formGroup]="itemForm" (ngSubmit)="onSubmit()">
  <div class="form-grid">
    <input type="text" formControlName="id" placeholder="Item ID (unique)" required>
    <input type="text" formControlName="name" placeholder="Product Name" required>
    <select formControlName="category"><option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option></select>
    <input type="number" formControlName="quantity" placeholder="Quantity" min="0" step="1">
    <input type="number" formControlName="price" placeholder="Price ($)" min="0.01" step="0.01">
    <input type="text" formControlName="supplier" placeholder="Supplier" required>
    <select formControlName="stockStatus"><option *ngFor="let s of stockStatuses" [value]="s">{{ s }}</option></select>
    <label><input type="checkbox" formControlName="popular"> Popular Item</label>
    <textarea formControlName="comment" placeholder="Comment (optional)" rows="3"></textarea>
  </div>
  <div class="button-group">
    <button type="submit" class="btn-primary">Save Product</button>
    <button type="button" class="btn-secondary" (click)="resetForm()">Clear Form</button>
  </div>
</form>
